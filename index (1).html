/* ═══ AI ANALYZER ═══ */
async function analyzeDoc(b64, mtype, fname) {
  // Simulated AI analysis for demo — real product uses live AI
  await new Promise(r => setTimeout(r, 1500 + Math.random() * 1500));
  
  const fnL = fname.toLowerCase();
  const isReceipt = fnL.includes("receipt") || fnL.includes("rcpt");
  const isInvoice = fnL.includes("invoice") || fnL.includes("inv") || fnL.includes("bill");
  const isPO = fnL.includes("po") || fnL.includes("purchase");
  const isContract = fnL.includes("contract") || fnL.includes("agreement") || fnL.includes("lease");
  const isLab = fnL.includes("lab") || fnL.includes("result") || fnL.includes("test");
  const isInsurance = fnL.includes("insurance") || fnL.includes("eob") || fnL.includes("claim");
  const isTax = fnL.includes("tax") || fnL.includes("w2") || fnL.includes("1099") || fnL.includes("w-2");
  const isPermit = fnL.includes("permit") || fnL.includes("license") || fnL.includes("inspection");
  const isHR = fnL.includes("hr") || fnL.includes("employee") || fnL.includes("application") || fnL.includes("onboard");
  const isHealth = fnL.includes("health") || fnL.includes("safety") || fnL.includes("food");
  const isTip = fnL.includes("tip") || fnL.includes("gratuity");
  const isService = fnL.includes("repair") || fnL.includes("service") || fnL.includes("work order") || fnL.includes("ro");
  const isTitle = fnL.includes("title") || fnL.includes("deed");
  
  let docType, conf, fields, sugName, sugFolder, summary, missing;
  const today = new Date().toISOString().slice(0,10);
  const fdate = today.replace(/-/g,"-");
  
  if (isPO) {
    docType = "Purchase Order"; conf = 96;
    fields = { vendor:"Vendor Corp", date:fdate, po_number:"PO-" + Math.floor(Math.random()*900000+100000), amount:"$" + (Math.random()*10000).toFixed(2), payment_terms:"Net 60", buyer:"Your Company", item:"Materials / Supplies", quantity:Math.floor(Math.random()*1000) + " units" };
    sugName = fields.vendor.replace(/\s/g,"") + "_" + fdate + "_PurchaseOrder_" + fields.po_number + ".pdf";
    sugFolder = "PurchaseOrders/" + fields.vendor.replace(/\s/g,"") + "/";
    summary = "Purchase order from " + fields.vendor + " for " + fields.quantity + " at " + fields.amount;
    missing = [];
  } else if (isInvoice) {
    docType = "Invoice"; conf = 97;
    fields = { vendor:"Acme Vendor Inc.", date:fdate, invoice_no:"INV-" + Math.floor(Math.random()*90000+10000), amount:"$" + (Math.random()*8000+200).toFixed(2), payment_terms:"Net 30", due_date:"2026-04-05" };
    sugName = fields.vendor.replace(/\s/g,"") + "_" + fdate + "_Invoice_" + fields.invoice_no + ".pdf";
    sugFolder = "Invoices/" + fields.vendor.replace(/\s/g,"") + "/";
    summary = "Invoice from " + fields.vendor + " for " + fields.amount + ", due " + fields.due_date;
    missing = [];
  } else if (isReceipt) {
    docType = "Receipt"; conf = 89;
    fields = { store:"Local Store", date:fdate, total:"$" + (Math.random()*500+10).toFixed(2), payment:"Credit card", items:Math.floor(Math.random()*20+1) + " items" };
    sugName = fields.store.replace(/\s/g,"") + "_" + fdate + "_Receipt.pdf";
    sugFolder = "Receipts/" + fields.store.replace(/\s/g,"") + "/";
    summary = "Receipt from " + fields.store + " for " + fields.total;
    missing = Math.random() > 0.5 ? ["Some line items partially illegible"] : [];
  } else if (isContract) {
    docType = "Contract"; conf = 95;
    fields = { parties:"Party A / Party B", date:fdate, type:"Service Agreement", expiry:"2027-03-01", signed:"No" };
    sugName = "PartyA_PartyB_ServiceAgreement_" + fdate + ".pdf";
    sugFolder = "Contracts/Active/";
    summary = "Service agreement between Party A and Party B, expires 2027-03-01.";
    missing = ["No signature detected"];
  } else if (isLab) {
    docType = "Lab Result"; conf = 93;
    fields = { patient:"Patient Name", date:fdate, provider:"Quest Diagnostics", test:"Standard Panel" };
    sugName = "Patient_" + fdate + "_LabResult.pdf";
    sugFolder = "Patients/Patient_Name/Labs/";
    summary = "Lab result from Quest Diagnostics for standard panel.";
    missing = [];
  } else if (isInsurance) {
    docType = "Insurance Document"; conf = 91;
    fields = { patient_or_claimant:"Name on file", insurer:"Insurance Co.", date:fdate, policy:"POL-" + Math.floor(Math.random()*900000+100000) };
    sugName = "InsuranceCo_" + fdate + "_Claim.pdf";
    sugFolder = "Insurance/Claims/";
    summary = "Insurance document from Insurance Co.";
    missing = [];
  } else if (isTax) {
    docType = "Tax Document"; conf = 94;
    fields = { form_type:"Tax Form", tax_year:"2025", date:fdate };
    sugName = "TaxForm_2025_" + fdate + ".pdf";
    sugFolder = "Tax/2025/";
    summary = "Tax document for tax year 2025.";
    missing = [];
  } else if (isPermit) {
    docType = "Permit"; conf = 92;
    fields = { permit_no:"PMT-" + Math.floor(Math.random()*9000+1000), issued:fdate, type:"General Permit" };
    sugName = "Permit_" + fields.permit_no + "_" + fdate + ".pdf";
    sugFolder = "Permits/Active/";
    summary = "Permit " + fields.permit_no + " issued " + fdate;
    missing = [];
  } else if (isHealth) {
    docType = "Health/Safety Document"; conf = 90;
    fields = { type:"Inspection/Safety Log", date:fdate, location:"Primary Location" };
    sugName = "HealthSafety_" + fdate + ".pdf";
    sugFolder = "Compliance/HealthSafety/";
    summary = "Health and safety document dated " + fdate;
    missing = [];
  } else if (isTip) {
    docType = "Tip Report"; conf = 84;
    fields = { period:"Current Period", total_tips:"$" + (Math.random()*3000+500).toFixed(2), employees:Math.floor(Math.random()*10+3), handwritten:"Possibly" };
    sugName = "TipReport_" + fdate + ".pdf";
    sugFolder = "Payroll/TipReports/";
    summary = "Tip report for current period.";
    missing = [];
  } else if (isService) {
    docType = "Repair/Service Order"; conf = 93;
    fields = { customer:"Customer Name", date:fdate, ro_number:"RO-" + Math.floor(Math.random()*9000+1000), service:"Service Performed" };
    sugName = "Customer_" + fields.ro_number + "_" + fdate + ".pdf";
    sugFolder = "Service/RepairOrders/";
    summary = "Repair order " + fields.ro_number + " for Customer Name.";
    missing = [];
  } else if (isTitle) {
    docType = "Title/Deed"; conf = 91;
    fields = { type:"Title Document", date:fdate, reference:"REF-" + Math.floor(Math.random()*90000+10000) };
    sugName = "Title_" + fields.reference + "_" + fdate + ".pdf";
    sugFolder = "Titles/";
    summary = "Title document dated " + fdate;
    missing = [];
  } else {
    // Generic - analyze filename for clues
    docType = "Document"; conf = 85;
    const cleanName = fname.replace(/[._-]/g, " ").replace(/\.(pdf|jpg|jpeg|png|tiff?)$/i, "");
    fields = { filename:fname, date:fdate, type:"Unclassified", size:Math.floor(Math.random()*5000+100) + " KB" };
    sugName = cleanName.replace(/\s+/g,"_") + "_" + fdate + ".pdf";
    sugFolder = "Documents/Unsorted/";
    summary = "Document uploaded on " + fdate + ". Classification based on content analysis.";
    missing = [];
  }
  
  const hasHandwriting = fnL.includes("handwrit") || fnL.includes("note") || fnL.includes("written") || Math.random() > 0.85;
  
  return {
    document_type: docType,
    confidence: conf,
    extracted_fields: fields,
    suggested_filename: sugName,
    suggested_folder: sugFolder,
    summary: summary,
    missing_info: missing,
    version_hint: fnL.includes("v2") || fnL.includes("revised") || fnL.includes("final") || fnL.includes("signed") ? 
      (fnL.includes("final") ? "final" : fnL.includes("signed") ? "signed" : "revised") : "original",
    contains_handwriting: hasHandwriting,
    handwriting_confidence: hasHandwriting ? (Math.random() > 0.5 ? "medium" : "high") : null,
    scan_quality: Math.random() > 0.8 ? "fair" : "good",
  };
}

function readB64(file) {
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>{const d=r.result.split(",")[1]; d?res(d):rej(new Error("encode fail"))};
    r.onerror=()=>rej(new Error("read fail"));
    r.readAsDataURL(file);
  });
}

    {id:"workflows",l:"Workflows",ic:"⚡",count:needsApproval.length+needsReview.length},
    {id:"search",l:"Search",ic:"🔍",count:null},
    {id:"audit",l:"Audit Trail",ic:"📋",count:null},
    {id:"rules",l:"Rules Engine",ic:"🔧",count:RULES.filter(r=>r.active).length},
    {id:"team",l:"Team & Roles",ic:"👥",count:USERS.length},
    {id:"retention",l:"Retention",ic:"📅",count:null},
    {id:"templates",l:"Templates",ic:"📦",count:TEMPLATES.length},
    {id:"security",l:"Security",ic:"🔒",count:null},
    {id:"settings",l:"Settings",ic:"⚙️",count:null},
  ];

  const css=`
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes spin{to{transform:rotate(360deg)}}
    *{box-sizing:border-box;margin:0;padding:0}
    ::selection{background:${C.acBg};color:${C.ac}}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-thumb{background:${C.bd};border-radius:3px}
    @media(max-width:768px){.sb{display:none!important}.mh{display:flex!important}.mn{padding:16px!important;margin-top:56px!important}}
    @media(min-width:769px){.mh{display:none!important}.mo{display:none!important}}
  `;

  const SidebarNav=({mobile})=>navItems.filter(n=>sidebarVisible(n.id)).map(n=>(
    <button key={n.id} onClick={()=>go(n.id)} style={{display:"flex",alignItems:"center",gap:mobile?10:8,width:"100%",padding:mobile?"13px 14px":"8px 14px",border:"none",cursor:"pointer",fontFamily:ft,background:nav===n.id?C.acBg:"transparent",color:nav===n.id?C.acT:C.t2,fontSize:mobile?14:12,fontWeight:nav===n.id?600:500,textAlign:"left",borderRadius:mobile?10:0,borderLeft:mobile?"none":nav===n.id?`2.5px solid ${C.ac}`:"2.5px solid transparent",marginBottom:mobile?2:0}}>
      <span style={{fontSize:mobile?16:14,opacity:nav===n.id?1:.7}}>{n.ic}</span>
      <span style={{flex:1}}>{n.l}</span>
      {n.count!==null&&<span style={{fontSize:10,fontWeight:600,color:n.id==="workflows"?C.or:C.t3,background:n.id==="workflows"?C.orBg:C.inset,padding:"1px 6px",borderRadius:4}}>{n.count}</span>}
    </button>
  ));

  const PageHeader=({title,sub})=>(
    <div style={{marginBottom:20}}>
      <h1 style={{fontSize:"clamp(18px,4vw,24px)",fontWeight:700,color:C.h,marginBottom:2,fontFamily:sf}}>{title}</h1>
      <p style={{fontSize:13,color:C.t3}}>{sub}</p>
    </div>
  );

  /* ═══ DOCUMENT DETAIL PANEL ═══ */
  const DocDetail=({doc})=>(
    <Card style={{padding:20,animation:"fadeUp .3s"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"start",flexWrap:"wrap",gap:8,marginBottom:16}}>
        <div>
          <div style={{fontSize:16,fontWeight:700,color:C.h,marginBottom:4}}>{doc.name}</div>
          <div style={{fontSize:12,color:C.t3}}>📁 {doc.folder}</div>
        </div>
        <button onClick={()=>setSelectedDoc(null)} style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${C.bd}`,background:C.sf,cursor:"pointer",fontSize:11,color:C.t2,fontFamily:ft}}>Close</button>
      </div>

      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
        <Badge c={C.gn} bg={C.gnBg}>{doc.type}</Badge>
        <Badge>{doc.conf}% confidence</Badge>
        <Badge c={C.t2} bg={C.inset}>v: {doc.version}</Badge>
        {doc.flags.map(f=><span key={f}>{flagBadge(f)}</span>)}
        {doc.approvalStatus==="needs_approval"&&<Badge c={C.or} bg={C.orBg}>Awaiting Approval</Badge>}
        <div style={{display:"flex",alignItems:"center",gap:3,fontSize:10,color:C.sh}}><Lock s={9} c={C.sh}/>Encrypted</div>
      </div>

      {/* Metadata */}
      <div style={{padding:"14px",borderRadius:10,background:C.inset,border:`1px solid ${C.bdL}`,marginBottom:14}}>
        <div style={{fontSize:10,color:C.t3,fontWeight:600,letterSpacing:.4,textTransform:"uppercase",marginBottom:10}}>Extracted Information</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:6}}>
          {Object.entries(doc.meta).map(([k,v])=>(
            <div key={k} style={{padding:"6px 8px",borderRadius:6,background:C.sf,border:`1px solid ${C.bdL}`}}>
              <div style={{fontSize:9,color:C.t3,textTransform:"uppercase",letterSpacing:.3,marginBottom:2}}>{k.replace(/_/g," ")}</div>
              <div style={{fontSize:12,fontWeight:600,color:C.h,wordBreak:"break-word"}}>{v}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Version chain */}
      <div style={{padding:"12px 14px",borderRadius:10,background:C.inset,border:`1px solid ${C.bdL}`,marginBottom:14}}>
        <div style={{fontSize:10,color:C.t3,fontWeight:600,letterSpacing:.4,textTransform:"uppercase",marginBottom:8}}>Version History</div>
        {doc.versions.map((v,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:i<doc.versions.length-1?`1px solid ${C.bdL}`:"none"}}>
            <div style={{width:8,height:8,borderRadius:4,background:v===doc.version?C.gn:C.bd}}/>
            <span style={{fontSize:12,fontWeight:v===doc.version?600:400,color:v===doc.version?C.gn:C.t2,textTransform:"capitalize"}}>{v}</span>
            {v===doc.version&&<span style={{fontSize:10,color:C.t3}}>(current)</span>}
          </div>
        ))}
      </div>

      {/* Connected Entities — people, companies, references */}
      {(()=>{
        const docEntities=ENTITIES.filter(e=>e.docs.includes(doc.id)||
          (e.name&&JSON.stringify(doc.meta).toLowerCase().includes(e.name.toLowerCase()))||
          (e.aka||[]).some(a=>JSON.stringify(doc.meta).toLowerCase().includes(a.toLowerCase()))
        );
        if(docEntities.length===0) return null;
        return (
          <div style={{padding:"12px 14px",borderRadius:10,background:C.blBg,border:`1px solid ${C.blBd}`,marginBottom:14}}>
            <div style={{fontSize:10,color:C.t3,fontWeight:600,letterSpacing:.4,textTransform:"uppercase",marginBottom:8}}>🔗 Connected People, Companies & References</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {docEntities.map(e=>(
                <div key={e.id} onClick={()=>{setSelectedEntity(e);setNav("search");setSelectedDoc(null)}} style={{
                  display:"flex",alignItems:"center",gap:6,padding:"6px 10px",borderRadius:7,
                  background:C.sf,border:`1px solid ${C.blBd}`,cursor:"pointer",transition:"all .15s",
                }}
                onMouseEnter={ev=>ev.currentTarget.style.background=C.hover}
                onMouseLeave={ev=>ev.currentTarget.style.background=C.sf}
                >
                  <span style={{fontSize:13}}>{e.type==="person"?"👤":e.type==="company"?"🏢":e.type==="location"?"📍":"#️⃣"}</span>
                  <div>
                    <div style={{fontSize:11,fontWeight:600,color:C.h}}>{e.name}</div>
                    <div style={{fontSize:9,color:C.t3}}>{e.type}{e.role?` · ${e.role}`:""} · {getEntityDocs(e).length} docs</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {/* Linked docs */}
      {doc.linked.length>0&&(
        <div style={{padding:"12px 14px",borderRadius:10,background:C.blBg,border:`1px solid ${C.blBd}`,marginBottom:14}}>
          <div style={{fontSize:10,color:C.t3,fontWeight:600,letterSpacing:.4,textTransform:"uppercase",marginBottom:8}}>🔗 Linked Documents</div>
          {doc.linked.map(lid=>{
            const ld=PROCESSED_DOCS.find(d=>d.id===lid);
            return ld?<div key={lid} onClick={()=>setSelectedDoc(ld)} style={{fontSize:12,color:C.bl,fontWeight:500,cursor:"pointer",padding:"4px 0"}}>{ld.name} ({ld.type})</div>:null;
          })}
        </div>
      )}

      {/* Retention */}
      {doc.retention&&(
        <div style={{padding:"10px 14px",borderRadius:8,background:C.inset,border:`1px solid ${C.bdL}`,fontSize:12,color:C.t2}}>
          📅 Retention: <strong style={{color:C.h}}>{doc.retention}</strong> — expires {doc.retentionExpiry}
        </div>
      )}

      {/* Approval actions */}
      {doc.approvalStatus==="needs_approval"&&(
        <div style={{display:"flex",gap:8,marginTop:14}}>
          <button style={{flex:1,padding:"10px",borderRadius:8,border:"none",background:C.gn,color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:ft}}>✓ Approve</button>
          <button style={{flex:1,padding:"10px",borderRadius:8,border:`1px solid ${C.rd}`,background:"transparent",color:C.rd,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:ft}}>✕ Reject</button>
        </div>
      )}

      {/* Audit for this doc */}
      <div style={{marginTop:14}}>
        <div style={{fontSize:10,color:C.t3,fontWeight:600,letterSpacing:.4,textTransform:"uppercase",marginBottom:8}}>Activity Log</div>
        {AUDIT_LOG.filter(a=>a.file.includes(doc.orig)||a.file.includes(doc.name.substring(0,20))).slice(0,5).map((a,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:`1px solid ${C.bdL}`,fontSize:11}}>
            <span>{a.icon}</span>
            <div style={{flex:1}}>
              <span style={{color:C.t,fontWeight:500}}>{a.action}</span>
              <span style={{color:C.t3,marginLeft:6}}>{a.detail}</span>
            </div>
            <span style={{color:C.t3,fontSize:10,flexShrink:0}}>{a.time}</span>
          </div>
        ))}
      </div>
    </Card>
  );

  /* ═══ ONBOARDING ═══ */
  if(screen==="onboarding") return (
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:ft,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
      <style>{css}</style>
      <div style={{width:"100%",maxWidth:560}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:32}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:28,height:28,borderRadius:7,background:C.ac,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:13}}>S</div>
            <span style={{fontSize:16,fontWeight:700,color:C.h}}>Settle<span style={{color:C.ac}}>.</span></span>
          </div>
          <button onClick={()=>setMode(m=>m==="light"?"dark":"light")} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",borderRadius:8,border:"1px solid "+C.bd,background:C.sf,cursor:"pointer",color:C.t2,fontSize:12,fontWeight:500,fontFamily:ft}}>
            {mode==="light"?<Moon s={13} c={C.t2}/>:<Sun s={13} c={C.t2}/>}
            {mode==="light"?"Dark":"Light"}
          </button>
        </div>
        <div style={{display:"flex",gap:6,marginBottom:36}}>
          {[0,1,2].map(i=><div key={i} style={{flex:1,height:3,borderRadius:2,background:i<=step?C.ac:C.bd,transition:"all 0.4s"}}/>)}
        </div>

        {step===0&&(
          <div style={{animation:"fadeUp 0.5s"}}>
            <p style={{fontSize:13,fontWeight:600,color:C.ac,letterSpacing:0.5,marginBottom:8}}>STEP 1 OF 3</p>
            <h1 style={{fontSize:28,fontWeight:700,color:C.h,lineHeight:1.2,marginBottom:6,fontFamily:sf}}>What documents does your business handle?</h1>
            <p style={{fontSize:15,color:C.t2,lineHeight:1.5,marginBottom:28}}>Select all that apply. You can always change this later.</p>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:8}}>
              {OB_TYPES.map(function(t){
                var on=selTypes.includes(t.id);
                return <button key={t.id} onClick={function(){togType(t.id)}} style={{padding:"13px 14px",borderRadius:10,cursor:"pointer",border:"1.5px solid "+(on?C.ac:C.bd),background:on?C.acBg:C.sf,textAlign:"left",display:"flex",alignItems:"center",gap:10,fontFamily:ft,transition:"all .15s"}}>
                  <span style={{fontSize:20}}>{t.ic}</span>
                  <span style={{fontSize:13,fontWeight:on?600:500,color:on?C.acT:C.t,flex:1}}>{t.l}</span>
                  {on&&<div style={{width:18,height:18,borderRadius:9,background:C.ac,display:"flex",alignItems:"center",justifyContent:"center"}}><Chk s={11} c="#fff"/></div>}
                </button>;
              })}
            </div>
            {selTypes.length>0&&<button onClick={function(){setStep(1)}} style={{width:"100%",marginTop:20,padding:13,borderRadius:10,border:"none",background:C.ac,color:"#fff",fontSize:15,fontWeight:600,cursor:"pointer",fontFamily:ft}}>Continue</button>}
          </div>
        )}

        {step===1&&(
          <div style={{animation:"fadeUp 0.5s"}}>
            <p style={{fontSize:13,fontWeight:600,color:C.ac,letterSpacing:0.5,marginBottom:8}}>STEP 2 OF 3</p>
            <h1 style={{fontSize:28,fontWeight:700,color:C.h,lineHeight:1.2,marginBottom:6,fontFamily:sf}}>Here's how it works.</h1>
            <p style={{fontSize:15,color:C.t2,lineHeight:1.5,marginBottom:24}}>We read each document and handle the rest.</p>
            <Card style={{padding:20,marginBottom:14}}>
              {[{b:"scan_00341.pdf",a:"AcmeSupply_Invoice_PO-2847.pdf",f:"Invoices/"},{b:"IMG_2847.jpg",a:"Smith_Jane_LabResult.pdf",f:"Patients/"},{b:"fax_032.pdf",a:"Chen_CLM-99201_Claim.pdf",f:"Claims/"}].map(function(x,i){
                return <div key={i} style={{padding:"12px 0",borderBottom:i<2?"1px solid "+C.bdL:"none"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:3}}>
                    <code style={{padding:"3px 8px",background:C.inset,borderRadius:5,fontSize:12,color:C.t3,textDecoration:"line-through"}}>{x.b}</code>
                    <span style={{color:C.gn,fontWeight:600}}>→</span>
                    <code style={{padding:"3px 8px",background:C.gnBg,borderRadius:5,fontSize:12,color:C.gn,fontWeight:600,border:"1px solid "+C.gnBd}}>{x.a}</code>
                  </div>
                  <span style={{fontSize:11,color:C.t3}}>📁 {x.f}</span>
                </div>;
              })}
            </Card>
            <Card style={{padding:20,background:C.shBg,borderColor:C.shBd}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                <Shield s={20} c={C.sh}/>
                <div>
                  <div style={{fontSize:15,fontWeight:700,color:C.h}}>Everything is encrypted.</div>
                  <div style={{fontSize:13,color:C.t2}}>Your documents, your data, every step.</div>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {["In transit · TLS 1.3","At rest · AES-256","All metadata","Access controlled"].map(function(t,i){
                  return <div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 10px",background:C.sf,borderRadius:7,border:"1px solid "+C.shBd,fontSize:11,fontWeight:500,color:C.t}}>
                    <Lock s={11} c={C.gn}/>{t}
                  </div>;
                })}
              </div>
            </Card>
            <div style={{display:"flex",gap:10,marginTop:20}}>
              <button onClick={function(){setStep(0)}} style={{flex:1,padding:13,borderRadius:10,border:"1px solid "+C.bd,background:C.sf,fontSize:14,fontWeight:600,cursor:"pointer",color:C.t2,fontFamily:ft}}>Back</button>
              <button onClick={function(){setStep(2)}} style={{flex:2,padding:13,borderRadius:10,border:"none",background:C.ac,color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:ft}}>Looks good</button>
            </div>
          </div>
        )}

        {step===2&&(
          <div style={{animation:"fadeUp 0.5s",textAlign:"center",paddingTop:24}}>
            <div style={{width:64,height:64,borderRadius:32,background:C.gnBg,border:"2px solid "+C.gnBd,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px"}}><Chk s={28} c={C.gn}/></div>
            <h1 style={{fontSize:28,fontWeight:700,color:C.h,marginBottom:6,fontFamily:sf}}>That's it. You're ready.</h1>
            <p style={{fontSize:15,color:C.t2,marginBottom:20}}>No really — the entire setup is done.</p>
            <div style={{display:"inline-flex",alignItems:"center",gap:6,padding:"7px 14px",borderRadius:8,background:C.shBg,border:"1px solid "+C.shBd,fontSize:13,color:C.sh,fontWeight:600,marginBottom:28}}>
              <Shield s={14} c={C.sh}/>End-to-end encryption active
            </div>
            <div>
              <button onClick={function(){setScreen("app");setNav("upload")}} style={{padding:"14px 36px",borderRadius:10,border:"none",background:C.ac,color:"#fff",fontSize:16,fontWeight:600,cursor:"pointer",fontFamily:ft}}>Scan your first document</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );

  /* ═══ RENDER ═══ */
  return (
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:ft,display:"flex"}}>
      <style>{css}</style>

      {/* Sidebar */}
      <aside className="sb" style={{width:200,background:C.sf,borderRight:`1px solid ${C.bd}`,padding:"16px 0",display:"flex",flexDirection:"column",minHeight:"100vh",flexShrink:0,overflowY:"auto"}}>
        <div style={{padding:"0 14px",marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",gap:7}}>
            <div style={{width:26,height:26,borderRadius:6,background:C.ac,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:12}}>S</div>
            <span style={{fontSize:16,fontWeight:700,color:C.h}}>Settle<span style={{color:C.ac}}>.</span></span>
          </div>
        </div>
        <nav style={{flex:1}}><SidebarNav/></nav>
        <div style={{padding:"0 10px"}}>
          <button onClick={()=>setMode(m=>m==="light"?"dark":"light")} style={{display:"flex",alignItems:"center",gap:5,width:"100%",padding:"7px 10px",borderRadius:7,border:`1px solid ${C.bd}`,background:C.hover,cursor:"pointer",color:C.t2,fontSize:11,fontWeight:500,fontFamily:ft,marginBottom:6,justifyContent:"center"}}>
            {mode==="light"?<Moon s={11} c={C.t2}/>:<Sun s={11} c={C.t2}/>}{mode==="light"?"Dark":"Light"}
          </button>
          <div style={{padding:"6px 8px",borderRadius:6,background:C.shBg,border:`1px solid ${C.shBd}`,display:"flex",alignItems:"center",gap:5}}>
            <Shield s={12} c={C.gn}/><span style={{fontSize:9,fontWeight:600,color:C.gn}}>Encrypted · AES-256</span>
          </div>
        </div>
      </aside>

      {/* Mobile header */}
      <div className="mh" style={{display:"none",position:"fixed",top:0,left:0,right:0,zIndex:100,height:52,padding:"0 14px",background:C.sf,borderBottom:`1px solid ${C.bd}`,alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <div style={{width:24,height:24,borderRadius:5,background:C.ac,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:11}}>S</div>
          <span style={{fontSize:14,fontWeight:700,color:C.h}}>Settle<span style={{color:C.ac}}>.</span></span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <Shield s={14} c={C.gn}/>
          <button onClick={()=>setMode(m=>m==="light"?"dark":"light")} style={{padding:"4px 7px",border:`1px solid ${C.bd}`,borderRadius:5,background:C.sf,cursor:"pointer",display:"flex"}}>{mode==="light"?<Moon s={13} c={C.t2}/>:<Sun s={13} c={C.t2}/>}</button>
          <button onClick={()=>setMenuOpen(!menuOpen)} style={{padding:4,border:`1px solid ${C.bd}`,borderRadius:5,background:C.sf,cursor:"pointer",display:"flex"}}>{menuOpen?<XI s={17} c={C.t}/>:<MI s={17} c={C.t}/>}</button>
        </div>
      </div>
      {menuOpen&&<div className="mo" style={{position:"fixed",top:52,left:0,right:0,bottom:0,zIndex:99,background:C.sf,padding:10,overflowY:"auto"}}><SidebarNav mobile/></div>}

      {/* Main */}
      <main className="mn" style={{flex:1,padding:"24px 28px",overflowY:"auto",maxHeight:"100vh"}}>
        <input ref={fileRef} type="file" accept=".pdf,.jpg,.jpeg,.png,.tiff,.tif,.webp" multiple style={{display:"none"}} onChange={e=>{if(e.target.files.length)processFiles(e.target.files);e.target.value=""}}/>

        {/* ═══ DASHBOARD ═══ */}
        {nav==="dashboard"&&(
          <div style={{animation:"fadeUp .4s"}}>
            <PageHeader title="Dashboard" sub="Real-time document operations overview"/>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:10,marginBottom:20}}>
              {[{l:"Today",v:"31",s:"↑18%"},{l:"Month",v:"156"},{l:"Accuracy",v:"94%"},{l:"Speed",v:"3.4s"},{l:"Flagged",v:allFlags.length,s:allFlags.length>0?"Action needed":""},{l:"Pending",v:needsApproval.length+needsReview.length}].map((c,i)=>(
                <Card key={i} style={{padding:"14px 16px"}}>
                  <div style={{fontSize:10,color:C.t3,fontWeight:500,textTransform:"uppercase",letterSpacing:.4,marginBottom:4}}>{c.l}</div>
                  <div style={{fontSize:22,fontWeight:700,color:C.h}}>{c.v}</div>
                  {c.s&&<div style={{fontSize:10,color:c.l==="Flagged"?C.or:C.gn,fontWeight:500,marginTop:2}}>{c.s}</div>}
                </Card>
              ))}
            </div>

            {/* Alerts */}
            {allFlags.length>0&&(
              <Card style={{padding:"14px 16px",background:C.orBg,borderColor:C.orBd,marginBottom:16}}>
                <div style={{fontSize:13,fontWeight:600,color:C.or,marginBottom:8}}>⚠ Action Required ({allFlags.length})</div>
                {allFlags.map(d=>(
                  <div key={d.id} onClick={()=>{setSelectedDoc(d);setNav("files")}} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 0",cursor:"pointer",borderBottom:`1px solid ${C.orBd}`,flexWrap:"wrap",gap:4}}>
                    <span style={{fontSize:12,color:C.t,fontWeight:500}}>{d.name}</span>
                    <div style={{display:"flex",gap:4}}>{d.flags.map(f=><span key={f}>{flagBadge(f)}</span>)}</div>
                  </div>
                ))}

        {/* ═══ SECURITY ═══ */}
        {nav==="security"&&(
          <div style={{animation:"fadeUp .4s"}}>
            <PageHeader title="Security" sub="How we protect every document."/>
            <Card style={{padding:18,background:C.gnBg,borderColor:C.gnBd,marginBottom:16,display:"flex",alignItems:"center",gap:14}}>
              <Shield s={26} c={C.gn}/><div><div style={{fontSize:16,fontWeight:700,color:C.h,fontFamily:sf}}>All systems secure</div><div style={{fontSize:12,color:C.t2}}>Every document encrypted at every step.</div></div>
            </Card>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:10,marginBottom:16}}>
              {[{t:"In Transit",s:"TLS 1.3",i:"🔒"},{t:"At Rest",s:"AES-256",i:"🛡️"},{t:"Metadata",s:"Encrypted",i:"🔐"},{t:"Access",s:"Role-Based",i:"👤"}].map((x,i)=>(
                <Card key={i} style={{padding:16}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:16}}>{x.i}</span><Badge c={C.gn} bg={C.gnBg}>✓ {x.s}</Badge></div><div style={{fontSize:13,fontWeight:600,color:C.h}}>{x.t}</div></Card>
              ))}
            </div>
            <Card style={{padding:16}}>
              <div style={{fontSize:13,fontWeight:600,color:C.h,marginBottom:10}}>Compliance</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {[{n:"HIPAA",r:true},{n:"SOC 2",r:true},{n:"FTC Safeguards",r:true},{n:"GDPR",r:true},{n:"StateRAMP",r:false},{n:"FedRAMP",r:false}].map((c,i)=>(
                  <div key={i} style={{padding:"6px 12px",borderRadius:6,background:c.r?C.gnBg:C.inset,border:`1px solid ${c.r?C.gnBd:C.bd}`,textAlign:"center"}}>
                    <div style={{fontSize:12,fontWeight:700,color:c.r?C.gn:C.t3}}>{c.n}</div>
                    <div style={{fontSize:9,color:c.r?C.gn:C.t3}}>{c.r?"✓ Ready":"Soon"}</div>
                  </div>
                ))}
              </div>
            </Card>
          </div>
        )}

        {/* ═══ SETTINGS ═══ */}
        {nav==="settings"&&(
          <div style={{animation:"fadeUp .4s"}}>
            <PageHeader title="Settings" sub="Configure your product. Toggle features on and off."/>

            {/* Appearance */}
            <Card style={{padding:18,marginBottom:12}}>
              <div style={{fontSize:13,fontWeight:600,color:C.h,marginBottom:10}}>Appearance</div>
              <div style={{display:"flex",gap:8}}>
                {["light","dark"].map(m=>(
                  <button key={m} onClick={()=>setMode(m)} style={{flex:1,padding:10,borderRadius:7,cursor:"pointer",fontFamily:ft,border:`2px solid ${mode===m?C.ac:C.bd}`,background:mode===m?C.acBg:C.sf,display:"flex",alignItems:"center",justifyContent:"center",gap:6,fontSize:12,fontWeight:600,color:mode===m?C.acT:C.t2}}>
                    {m==="light"?<Sun s={13} c={mode===m?C.acT:C.t2}/>:<Moon s={13} c={mode===m?C.acT:C.t2}/>}{m==="light"?"Light":"Dark"}
                  </button>
                ))}
              </div>
            </Card>

            {/* Quick Presets */}
            <Card style={{padding:18,marginBottom:12}}>
              <div style={{fontSize:13,fontWeight:600,color:C.h,marginBottom:4}}>Quick Setup</div>
              <p style={{fontSize:11,color:C.t3,marginBottom:12}}>Pick your industry to auto-configure the right features. You can fine-tune everything below.</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {[
                  {id:"medical",label:"🩺 Medical / Dental",desc:"Patient records, labs, insurance, HIPAA"},
                  {id:"restaurant",label:"🍽️ Restaurant / Hospitality",desc:"Receipts, tips, inspections, food safety"},
                  {id:"dealership",label:"🚗 Auto Dealership",desc:"Titles, ROs, deal jackets, FTC compliance"},
                  {id:"legal",label:"⚖️ Law Firm",desc:"Case files, court orders, retention"},
                  {id:"government",label:"🏛️ Government",desc:"Permits, inspections, compliance"},
                  {id:"all",label:"✨ Everything On",desc:"Enable all features"},
                ].map(p=>(
                  <button key={p.id} onClick={()=>applyPreset(p.id)} style={{
                    padding:"10px 14px",borderRadius:8,cursor:"pointer",fontFamily:ft,
                    border:`1px solid ${C.bd}`,background:C.sf,textAlign:"left",
                    transition:"all .15s",flex:"1 1 auto",minWidth:160,
                  }}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=C.ac;e.currentTarget.style.background=C.acBg}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor=C.bd;e.currentTarget.style.background=C.sf}}
                  >
                    <div style={{fontSize:13,fontWeight:600,color:C.h}}>{p.label}</div>
                    <div style={{fontSize:10,color:C.t3,marginTop:2}}>{p.desc}</div>
                  </button>
                ))}
              </div>
            </Card>

            {/* Feature Toggles — grouped */}
            {FEATURE_GROUPS.map(group=>(
              <Card key={group.id} style={{padding:18,marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"start",marginBottom:4}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:C.h}}>{group.label}</div>
                    <div style={{fontSize:11,color:C.t3}}>{group.desc}</div>
                  </div>
                  {!group.locked && (
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>{const upd={...features};group.items.forEach(i=>{upd[i.key]=true});setFeatures(upd)}} style={{padding:"3px 8px",borderRadius:4,border:`1px solid ${C.gnBd}`,background:C.gnBg,fontSize:10,color:C.gn,fontWeight:600,cursor:"pointer",fontFamily:ft}}>All on</button>
                      <button onClick={()=>{const upd={...features};group.items.forEach(i=>{upd[i.key]=false});setFeatures(upd)}} style={{padding:"3px 8px",borderRadius:4,border:`1px solid ${C.bd}`,background:C.inset,fontSize:10,color:C.t3,fontWeight:600,cursor:"pointer",fontFamily:ft}}>All off</button>
                    </div>
                  )}
                </div>
                <div style={{marginTop:12}}>
                  {group.items.map(item=>(
                    <div key={item.key} style={{
                      display:"flex",alignItems:"center",justifyContent:"space-between",
                      padding:"8px 0",borderBottom:`1px solid ${C.bdL}`,
                      opacity:group.locked?0.7:features[item.key]?1:0.45,
                      transition:"opacity .2s",
                    }}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,fontWeight:500,color:C.t}}>{item.label}</div>
                        {item.desc&&<div style={{fontSize:10,color:C.t3}}>{item.desc}</div>}
                      </div>
                      {group.locked ? (
                        <Badge c={C.gn} bg={C.gnBg}>Always on</Badge>
                      ) : (
                        <div onClick={()=>toggleFeature(item.key)} style={{
                          width:36,height:20,borderRadius:10,
                          background:features[item.key]?C.gn:C.bd,
                          cursor:"pointer",position:"relative",transition:"background .2s",
                          flexShrink:0,marginLeft:12,
                        }}>
                          <div style={{
                            width:16,height:16,borderRadius:8,background:"#fff",
                            position:"absolute",top:2,
                            left:features[item.key]?18:2,
                            transition:"left .2s",
                            boxShadow:"0 1px 3px rgba(0,0,0,.2)",
                          }}/>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </Card>
            ))}

            {/* Active feature count */}
            <Card style={{padding:"14px 18px",background:C.acBg,borderColor:C.acBd}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:C.h}}>
                    {Object.values(features).filter(v=>v).length} of {Object.keys(features).length} features active
                  </div>
                  <div style={{fontSize:11,color:C.t2}}>
                    {navItems.filter(n=>sidebarVisible(n.id)).length} sidebar sections visible
                  </div>
                </div>
                <button onClick={()=>applyPreset("all")} style={{padding:"7px 14px",borderRadius:7,border:`1px solid ${C.ac}`,background:"transparent",color:C.ac,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:ft}}>Enable all</button>
              </div>
            </Card>
          </div>
        )}
      </main>
    </div>
  );
}


ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
<script>
// Fallback error display
window.onerror = function(msg, url, line) {
  document.getElementById('root').innerHTML = '<div style="padding:40px;font-family:sans-serif;max-width:600px;margin:0 auto;"><h2 style="color:#c00;">Something went wrong</h2><p>Error: ' + msg + '</p><p>Line: ' + line + '</p><p>Please try refreshing the page or opening in Chrome/Safari.</p></div>';
};
// Timeout fallback if Babel compilation takes too long
setTimeout(function() {
  var root = document.getElementById('root');
  if (root && root.querySelector && root.querySelector('[data-reactroot]') === null && root.innerHTML.indexOf('Loading demo') > -1) {
    root.innerHTML = '<div style="padding:40px;font-family:sans-serif;max-width:600px;margin:0 auto;text-align:center;"><h2 style="color:#1A1A18;">Still loading...</h2><p style="color:#6B6B66;">The demo is compiling. If this takes more than 15 seconds, try refreshing or opening in Chrome.</p></div>';
  }
}, 10000);
</script>
</body>
</html>
